repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
        args: ["--unsafe"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 6fec9b7edb08fd9989088709d864a7826dc74e80  # frozen: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: a4727cbbcd26d7098e96b9cb738169b59711ae51  # frozen: v1.24.1
    hooks:
      - id: zizmor

  - repo: https://github.com/sirosen/check-jsonschema
    rev: 943377262562a12b57292fc98fabd7dbf81451fe  # frozen: 0.37.2
    hooks:
      - id: check-github-actions
      - id: check-github-workflows

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        description: "Static type checking"
        entry: mypy clauditor/
        language: system
        files: '.*\.py'
        pass_filenames: false

      - id: bandit
        name: bandit
        description: "Find common security issues in Python code"
        entry: bandit -q -lll -r clauditor/
        language: system
        files: '.*\.py'
        pass_filenames: false

      - id: pip-audit
        name: pip-audit
        description: "Check dependencies for known security vulnerabilities"
        entry: pip-audit
        language: system
        pass_filenames: false

      - id: vulture
        name: vulture
        description: "Find unused code"
        entry: vulture --min-confidence 100 clauditor/
        language: system
        files: '.*\.py'
        pass_filenames: false
