name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  version-check:
    name: Verify version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check versions match release tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          INIT_VERSION=$(grep '__version__' clauditor/__init__.py | sed 's/__version__ = "\(.*\)"/\1/')

          echo "Release tag : $TAG"
          echo "pyproject.toml : $TOML_VERSION"
          echo "clauditor/__init__.py : $INIT_VERSION"

          if [ "$TOML_VERSION" != "$INIT_VERSION" ]; then
            echo "ERROR: pyproject.toml ($TOML_VERSION) and __init__.py ($INIT_VERSION) versions do not match."
            exit 1
          fi

          if [ "$TAG" != "$TOML_VERSION" ]; then
            echo "ERROR: Release tag ($TAG) does not match package version ($TOML_VERSION)."
            exit 1
          fi

          echo "OK: All versions are consistent ($TAG)."

  test:
    name: Run tests before publish
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  publish:
    name: Build, sign, and publish
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # required for OIDC PyPI publishing and Sigstore signing

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install build tool
        run: pip install build==1.4.0

      - name: Build package
        run: python -m build

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
          release-signing-artifacts: false

      - name: Move sigstore bundles out of dist
        run: mkdir -p sigstore-bundles && mv dist/*.sigstore.json sigstore-bundles/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
