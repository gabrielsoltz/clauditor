name: Security

on:
  push:
  pull_request:
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly disclosed vulnerabilities
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run bandit
        run: bandit -q -lll -r clauditor/

  pip-audit:
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Audit dependencies
        run: pip-audit

  zizmor:
    name: zizmor (workflow security)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run zizmor (SARIF upload)
        run: zizmor --format=sarif . > zizmor.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: zizmor.sarif
          category: zizmor

      - name: Run zizmor (CI gate — fail on high severity)
        run: zizmor --min-severity=high .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
