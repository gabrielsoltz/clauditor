id: CC001
name: CODEOWNERS Enforcement for Claude Code Paths
description: >
  Ensures that the /.claude/ directory and /CLAUDE.md file have CODEOWNERS
  entries with at least one assigned owner. This guarantees that any change
  to Claude Code configurations or instructions requires review and approval
  from someone other than the PR author before merging.

scope:
  - repository

severity: HIGH

threat: >
  Without CODEOWNERS entries on Claude Code paths, any repository contributor
  with write access can silently modify Claude Code settings, hooks, permissions,
  and CLAUDE.md instructions without requiring review from anyone else. This
  creates a supply chain attack vector: an attacker (or malicious insider) could
  add dangerous hooks, escalate tool permissions, or inject malicious instructions
  into CLAUDE.md without oversight. CODEOWNERS ensures that the PR author cannot
  self-approve changes to these files — a reviewer who is not the author must
  approve before merging. This check verifies that an owner is assigned; it does
  not require a specific team name, so it works for any organization structure.

category: access_control

check_type: file_content

check_config:
  # CODEOWNERS can live in any of these locations (GitHub/GitLab/Bitbucket)
  search_paths:
    - CODEOWNERS
    - .github/CODEOWNERS
    - .gitlab/CODEOWNERS
    - docs/CODEOWNERS
  required_entries:
    - pattern: "/.claude/"
    - pattern: "/CLAUDE.md"

remediation: >
  Add the following entries to your CODEOWNERS file
  (CODEOWNERS, .github/CODEOWNERS, .gitlab/CODEOWNERS, or docs/CODEOWNERS),
  replacing @your-security-team with your organization's actual team handle:

    /.claude/ @your-security-team
    /CLAUDE.md @your-security-team

  The assigned owner must be a team or individual who is not the typical
  author of Claude Code configuration changes — this ensures the PR author
  cannot self-approve modifications to these sensitive files. Combined with
  a branch protection rule requiring "Require review from Code Owners",
  this enforces mandatory peer review on every change to Claude Code paths.

fix_available: true

references:
  - https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-code-owners
  - https://docs.gitlab.com/ee/user/project/codeowners/
  - https://code.claude.com/docs/en/settings
