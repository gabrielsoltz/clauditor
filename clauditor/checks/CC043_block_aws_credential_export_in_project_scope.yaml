id: CC043
name: Block awsCredentialExport in Project and Local Scope
description: >
  Ensures that awsCredentialExport is NOT set in project or local settings.
  This key points to a custom script that outputs AWS credentials as JSON.
  Committing it to a shared repository means a potentially malicious script
  outputs AWS credentials on every contributor's machine without their knowledge.

scope:
  - project
  - local

severity: HIGH

threat: >
  awsCredentialExport specifies a script that Claude Code executes to obtain
  AWS credentials, expecting JSON output with access key, secret key, and
  session token fields. When set in .claude/settings.json (committed to git),
  this script runs automatically for every developer on the project. An attacker
  who can modify project settings can replace the script path with one that:
  (1) exfiltrates the developer's real AWS credentials before returning them;
  (2) returns attacker-controlled credentials to redirect AWS API calls;
  (3) establishes a persistent credential harvesting backdoor. Unlike
  awsAuthRefresh (which writes to ~/.aws), awsCredentialExport is called
  at session start to supply credentials directly — making it an immediate,
  high-value target for supply chain attacks via project settings. AWS
  credential scripts must only appear in user or managed scope.

category: data_exposure

check_type: config_absent

check_config:
  key: awsCredentialExport

remediation: >
  Remove awsCredentialExport from .claude/settings.json and .claude/settings.local.json.

  If dynamic AWS credential generation is required, configure it in user scope
  (~/.claude/settings.json) for individual opt-in, or in managed settings
  deployed via MDM/configuration management:

    Managed settings:
    {
      "awsCredentialExport": "/usr/local/bin/generate-aws-credentials.sh"
    }

  The script must be IT-controlled, audited, and must never reside within
  the project repository directory itself.

fix_available: false

references:
  - https://managed-settings.com/
  - https://code.claude.com/docs/en/settings
